<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#2A1B3D"/>
      <stop offset="60%" stop-color="#0F0B1A"/>
      <stop offset="100%" stop-color="#0B0B0F"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C5CFF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7C5CFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow blob center -->
  <ellipse cx="600" cy="200" rx="350" ry="250" fill="#7C5CFF" opacity="0.08" filter="url(#blur)"/>

  <!-- Stars -->
  <circle cx="120" cy="80" r="1.5" fill="#a78bfa" opacity="0.6"/>
  <circle cx="340" cy="45" r="1" fill="#F5F5F5" opacity="0.4"/>
  <circle cx="890" cy="60" r="2" fill="#a78bfa" opacity="0.5"/>
  <circle cx="1050" cy="110" r="1.5" fill="#F5F5F5" opacity="0.3"/>
  <circle cx="200" cy="180" r="1" fill="#7C5CFF" opacity="0.7"/>
  <circle cx="980" cy="200" r="1.5" fill="#a78bfa" opacity="0.4"/>
  <circle cx="70" cy="320" r="1" fill="#F5F5F5" opacity="0.3"/>
  <circle cx="1130" cy="380" r="1.5" fill="#a78bfa" opacity="0.5"/>
  <circle cx="440" cy="560" r="1" fill="#7C5CFF" opacity="0.4"/>
  <circle cx="760" cy="580" r="1.5" fill="#F5F5F5" opacity="0.3"/>

  <!-- Moon arc symbol -->
  <path d="M 564 230 A 38 38 0 0 1 636 230" fill="none" stroke="#7C5CFF" stroke-width="3" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="600" cy="248" r="6" fill="#7C5CFF"/>
  <!-- Outer glow ring -->
  <circle cx="600" cy="248" r="11" fill="none" stroke="#7C5CFF" stroke-width="1" opacity="0.35"/>

  <!-- ONYRA wordmark -->
  <text x="600" y="340" font-family="Georgia, serif" font-size="96" font-weight="400" fill="#F5F5F5" letter-spacing="20" text-anchor="middle">ONYRA</text>

  <!-- Separator line -->
  <rect x="570" y="362" width="60" height="1" fill="#2A1B3D"/>

  <!-- Tagline -->
  <text x="600" y="400" font-family="Georgia, serif" font-size="18" fill="#6B7280" letter-spacing="5" text-anchor="middle">DESCUBRÍ QUÉ DICEN TUS SUEÑOS</text>

  <!-- Bottom URL -->
  <text x="600" y="580" font-family="system-ui, sans-serif" font-size="16" fill="#374151" letter-spacing="2" text-anchor="middle">onyraapp.github.io/Oniria</text>
</svg>
